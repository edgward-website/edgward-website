name: Carte sécurité — collecte 2x/jour

# Midi et soir (heure suisse ≈ 12h / 19h ; UTC ne gère pas l'heure d'été,
# léger décalage d'1h possible selon la saison — sans conséquence).
on:
  schedule:
    - cron: "0 10 * * *"   # ~12h00 (CEST) / 11h00 (CET)
    - cron: "0 17 * * *"   # ~19h00 (CEST) / 18h00 (CET)
  workflow_dispatch:        # bouton « Run » manuel dans l'onglet Actions

# Mode test : lecture seule. Le robot NE publie PAS ; il produit un aperçu
# téléchargeable (pièce jointe) + affiche le résumé dans le journal.
permissions:
  contents: read

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Collecte + tri IA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/carte-securite/collecte.mjs

      - name: Afficher le résumé dans le journal
        if: always()
        run: |
          echo "===== RÉSUMÉ ====="
          cat scripts/carte-securite/resume-pr.md || echo "(pas de résumé généré)"
          echo "=================="

      - name: Déposer l'aperçu (pièce jointe téléchargeable)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apercu-carte-securite
          path: |
            src/data/evenements-securite.json
            scripts/carte-securite/resume-pr.md
          if-no-files-found: warn
